name: report_cnaqc
channels: [bioconda, conda-forge, nodefaults]
# CNAqc is GitHub-only; installed via pip git+ after conda resolves dependencies.
# For offline HPC: conda-pack this env after creation (see setup/offline_prefetch.sh).
dependencies:
  - r-base 
  - r-optparse 
  - r-jsonlite
  - r-ggplot2
  - r-dplyr
  - r-data.table
  - r-patchwork
  - r-ggrepel
  - matplotlib 
  - numpy 
  - pandas 
  - scipy